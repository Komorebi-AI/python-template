# prek configuration (https://github.com/j178/prek)
# Compatible with pre-commit hooks: https://pre-commit.com/hooks.html
ci:
  autoupdate_commit_msg: "chore: update prek hooks"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=50000]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
        exclude: .vscode/settings.json
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
      - id: pretty-format-json
        args: [--autofix, --no-ensure-ascii]
        exclude: .vscode/settings.json
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        types_or: [python, pyi, jupyter]
        args: [--fix, --show-fixes, --exit-non-zero-on-fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.12
    hooks:
      - id: uv-lock
  # Auto-syncs rev pins in this file with versions resolved in uv.lock.
  # Placed after uv-lock so it sees a current lockfile.
  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.5.0
    hooks:
      - id: sync-with-uv
  - repo: local
    hooks:
      - id: local-ty
        name: ty check
        entry: uv run ty check python_template tests
        require_serial: true
        language: unsupported
        pass_filenames: false
      - id: deptry
        name: deptry
        entry: uv run deptry .
        language: unsupported
        always_run: true
        pass_filenames: false
